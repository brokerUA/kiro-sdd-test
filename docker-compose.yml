services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  php-fpm-laravel-api:
    build:
      context: ./api
      dockerfile: Dockerfile.fpm
    volumes:
      - ./api:/var/www/api
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: local
      APP_KEY: base64:placeholder==
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis

  nginx-api:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf
      - ./api:/var/www/api
    depends_on:
      - php-fpm-laravel-api
    ports:
      - "8080:80"

  php-cli-laravel-queue-worker-default:
    build:
      context: ./api
      dockerfile: Dockerfile.cli
    command: php artisan queue:work --queue=default
    volumes:
      - ./api:/var/www/api
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: local
      APP_KEY: base64:placeholder==
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis

  php-cli-laravel-background:
    build:
      context: ./api
      dockerfile: Dockerfile.cli
    command: php artisan schedule:work
    volumes:
      - ./api:/var/www/api
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: local
      APP_KEY: base64:placeholder==
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080

  nginx-frontend:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/frontend.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nextjs
    ports:
      - "80:80"

volumes:
  postgres_data:
